name: PR Acceptance

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

jobs:
  acceptance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Prettier Check
        run: bun run prettier --check . --ignore-unknown

      - name: Bun Run
        run: bun test

      - name: Python Unit Tests
        run: python -m unittest discover -s bin -p '*_test.py'
